services:
  - type: web
    name: student-market
    env: node
    startCommand: node server-pg.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_MODE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: VK_CLIENT_ID
        sync: false
      - key: VK_CLIENT_SECRET
        sync: false
      - key: VK_REDIRECT_URI
        sync: false

databases:
  - name: student-db
    databaseName: studentmarket
    plan: free
